services:
  web:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: roomink
      POSTGRES_USER: roomink
      POSTGRES_PASSWORD: roomink
    ports:
      - "5433:5432"
    volumes:
      - roomink_db_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1125:1025"

volumes:
  roomink_db_data: